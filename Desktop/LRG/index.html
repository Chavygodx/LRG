<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конструктор трёхмерных сцен</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        Режим: <span id="mode">Кисть</span> | Радиус кисти: <span id="radius">2.0</span>
    </div>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DDSLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // --- Глобальные переменные ---
        let scene, camera, renderer;
        let planeMesh, skySphere;
        let brushCircle; // теперь это Mesh (плоский диск)
        let brushRadius = 2.0;
        let brushMode = true;
        let mouse = { x: 0, y: 0 };
        let targetList = [];
        let selectedObject = null;
        let isDragging = false;
        let raycaster = new THREE.Raycaster();
        let clock = new THREE.Clock();

        // Анимация
        let mixer = null;
        let morphs = [];

        // GUI
        let gui, params;

        // --- Инициализация сцены ---
        function initScene() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 15, 25);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Освещение
            const ambientLight = new THREE.AmbientLight(0xa0a0a0);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight1.position.set(10, 20, 5);
            dirLight1.castShadow = true;
            dirLight1.receiveShadow = true;
            dirLight1.shadow.mapSize.width = 1024;
            dirLight1.shadow.mapSize.height = 1024;
            const d = 30;
            dirLight1.shadow.camera.left = -d;
            dirLight1.shadow.camera.right = d;
            dirLight1.shadow.camera.top = d;
            dirLight1.shadow.camera.bottom = -d;
            dirLight1.shadow.camera.near = 1;
            dirLight1.shadow.camera.far = 50;
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xffeedd, 1.0);
            dirLight2.position.set(-10, 15, -10);
            dirLight2.castShadow = true;
            dirLight2.receiveShadow = true;
            scene.add(dirLight2);

            const backLight = new THREE.DirectionalLight(0x99ccff, 0.6);
            backLight.position.set(-5, 5, -10);
            scene.add(backLight);

            // Плоскость с травой
            const geometry = new THREE.PlaneGeometry(30, 30, 128, 128);
            geometry.rotateX(-Math.PI / 2);

            const material = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, side: THREE.DoubleSide });
            planeMesh = new THREE.Mesh(geometry, material);
            planeMesh.receiveShadow = true;
            planeMesh.castShadow = false;
            planeMesh.position.y = 0;
            scene.add(planeMesh);

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(
                'textures/grass.jpg',
                (tex) => {
                    tex.wrapS = THREE.RepeatWrapping;
                    tex.wrapT = THREE.RepeatWrapping;
                    tex.repeat.set(8, 8);
                    planeMesh.material.map = tex;
                    planeMesh.material.needsUpdate = true;
                },
                undefined,
                () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 512;
                    canvas.height = 512;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#3d9f3d';
                    ctx.fillRect(0, 0, 512, 512);
                    for (let i = 0; i < 2000; i++) {
                        ctx.fillStyle = i % 2 === 0 ? '#2d7a2d' : '#4caf4c';
                        ctx.fillRect(Math.floor(Math.random()*512), Math.floor(Math.random()*512), 4, 4);
                    }
                    const canvasTex = new THREE.CanvasTexture(canvas);
                    canvasTex.wrapS = THREE.RepeatWrapping;
                    canvasTex.wrapT = THREE.RepeatWrapping;
                    canvasTex.repeat.set(8, 8);
                    planeMesh.material.map = canvasTex;
                    planeMesh.material.needsUpdate = true;
                }
            );

            // Небо
            const skyGeometry = new THREE.SphereGeometry(100, 64, 64);
            textureLoader.load(
                'textures/earthcloudmap.jpg',
                (tex) => {
                    const skyMaterial = new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide });
                    skySphere = new THREE.Mesh(skyGeometry, skyMaterial);
                    skySphere.position.y = 0;
                    scene.add(skySphere);
                },
                undefined,
                () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 1024;
                    canvas.height = 512;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#000020';
                    ctx.fillRect(0, 0, 1024, 512);
                    for (let i = 0; i < 2000; i++) {
                        const x = Math.random() * 1024;
                        const y = Math.random() * 512;
                        const r = Math.random() * 2 + 1;
                        ctx.fillStyle = `rgb(255,255,${Math.floor(200 + Math.random()*55)})`;
                        ctx.beginPath();
                        ctx.arc(x, y, r, 0, 2*Math.PI);
                        ctx.fill();
                    }
                    const fallbackTex = new THREE.CanvasTexture(canvas);
                    const skyMaterial = new THREE.MeshBasicMaterial({ map: fallbackTex, side: THREE.BackSide });
                    skySphere = new THREE.Mesh(skyGeometry, skyMaterial);
                    skySphere.position.y = 0;
                    scene.add(skySphere);
                }
            );

            // Кисть - плоский полупрозрачный диск
            const brushGeometry = new THREE.CircleGeometry(1, 32);
            const brushMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffff00, 
                transparent: true, 
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            brushCircle = new THREE.Mesh(brushGeometry, brushMaterial);
            brushCircle.rotation.x = -Math.PI / 2; // лежит в плоскости XZ
            brushCircle.position.y = 0.05; // чуть выше земли
            brushCircle.scale.set(brushRadius, brushRadius, brushRadius);
            scene.add(brushCircle);

            // GUI
            setupGUI();

            // События
            renderer.domElement.addEventListener('mousedown', onDocumentMouseDown, false);
            renderer.domElement.addEventListener('mouseup', onDocumentMouseUp, false);
            renderer.domElement.addEventListener('mousemove', onDocumentMouseMove, false);
            renderer.domElement.addEventListener('wheel', onDocumentMouseScroll, false);
            renderer.domElement.addEventListener("contextmenu", (event) => event.preventDefault());

            window.addEventListener('resize', onWindowResize, false);
        }

        // GUI
        function setupGUI() {
            gui = new dat.GUI();
            gui.width = 300;

            params = {
                brushMode: true,
                brushRadius: brushRadius,
                addTree: () => addTree(),
                addHouse: () => addHouse(),
                addFence: () => addFence(),
                addBush: () => addBush(),
                addBird: () => addBird(),
                deleteSelected: () => deleteSelectedObject(),
                scaleX: 1,
                scaleY: 1,
                scaleZ: 1,
                rotX: 0,
                rotY: 0,
                rotZ: 0
            };

            const modeFolder = gui.addFolder('Режим');
            modeFolder.add(params, 'brushMode').name('Режим кисти').onChange(val => {
                brushMode = val;
                document.getElementById('mode').innerText = brushMode ? 'Кисть' : 'Выбор';
                brushCircle.visible = brushMode;
            });
            modeFolder.add(params, 'brushRadius').name('Радиус кисти').min(0.5).max(5.0).step(0.1).listen().onChange(val => {
                brushRadius = val;
                brushCircle.scale.set(brushRadius, brushRadius, brushRadius);
                document.getElementById('radius').innerText = brushRadius.toFixed(1);
            });
            modeFolder.open();

            const addFolder = gui.addFolder('Добавить объект');
            addFolder.add(params, 'addTree').name('Дерево');
            addFolder.add(params, 'addHouse').name('Дом');
            addFolder.add(params, 'addFence').name('Ограда');
            addFolder.add(params, 'addBush').name('Куст');
            addFolder.add(params, 'addBird').name('Птица (анимир.)');
            addFolder.add(params, 'deleteSelected').name('Удалить выбранный');
            addFolder.open();

            const transformFolder = gui.addFolder('Трансформации');
            transformFolder.add(params, 'scaleX').name('Масштаб X').min(0.1).max(5).step(0.1).onChange(updateSelectedTransform);
            transformFolder.add(params, 'scaleY').name('Масштаб Y').min(0.1).max(5).step(0.1).onChange(updateSelectedTransform);
            transformFolder.add(params, 'scaleZ').name('Масштаб Z').min(0.1).max(5).step(0.1).onChange(updateSelectedTransform);
            transformFolder.add(params, 'rotX').name('Поворот X').min(-Math.PI).max(Math.PI).step(0.01).onChange(updateSelectedTransform);
            transformFolder.add(params, 'rotY').name('Поворот Y').min(-Math.PI).max(Math.PI).step(0.01).onChange(updateSelectedTransform);
            transformFolder.add(params, 'rotZ').name('Поворот Z').min(-Math.PI).max(Math.PI).step(0.01).onChange(updateSelectedTransform);
            transformFolder.open();

            gui.open();

            document.getElementById('mode').innerText = brushMode ? 'Кисть' : 'Выбор';
            document.getElementById('radius').innerText = brushRadius.toFixed(1);
        }

        // Загрузка статической модели (obj+mtl)
        function loadModel(path, objName, mtlName, callback) {
            const onProgress = function(xhr) {
                if (xhr.lengthComputable) {
                    const percentComplete = xhr.loaded / xhr.total * 100;
                    console.log(Math.round(percentComplete, 2) + '% downloaded');
                }
            };
            const onError = function(xhr) { 
                console.error('Ошибка загрузки модели', xhr);
            };

            const mtlLoader = new THREE.MTLLoader();
            mtlLoader.setPath(path);
            mtlLoader.load(mtlName, function(materials) {
                materials.preload();
                const objLoader = new THREE.OBJLoader();
                objLoader.setMaterials(materials);
                objLoader.setPath(path);
                objLoader.load(objName, function(object) {
                    object.scale.set(0.2, 0.2, 0.2);
                    object.position.set(0, 0, 0);
                    object.castShadow = true;
                    object.receiveShadow = true;
                    scene.add(object);
                    targetList.push(object);
                    if (callback) callback(object);
                }, onProgress, onError);
            }, onProgress, onError);
        }

        // Загрузка анимированной модели (glb)
        function loadAnimatedModel(path, callback) {
            if (!mixer) {
                mixer = new THREE.AnimationMixer(scene);
            }

            const loader = new THREE.GLTFLoader();
            loader.load(path, function(gltf) {
                const mesh = gltf.scene.children[0];
                const clip = gltf.animations[0];
                if (clip && mixer) {
                    mixer.clipAction(clip, mesh).setDuration(1).startAt(0).play();
                }

                mesh.scale.set(0.2, 0.2, 0.2);
                mesh.position.set(0, 1, 0);
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                scene.add(mesh);
                targetList.push(mesh);
                morphs.push(mesh);

                if (callback) callback(mesh);
            }, undefined, function(error) {
                console.error('Ошибка загрузки анимированной модели:', error);
            });
        }

        // Добавление объектов
        function addTree() {
            loadModel('models/дерево/', 'Tree.obj', 'Tree.mtl', function(obj) {
                obj.position.set((Math.random() - 0.5) * 20, 0, (Math.random() - 0.5) * 20);
            });
        }

        function addBush() {
            loadModel('models/куст/', 'Bush1.obj', 'Bush1.mtl', function(obj) {
                obj.position.set((Math.random() - 0.5) * 20, 0, (Math.random() - 0.5) * 20);
            });
        }

        function addFence() {
            loadModel('models/ограда/', 'grade.obj', 'grade.mtl', function(obj) {
                obj.position.set((Math.random() - 0.5) * 20, 0, (Math.random() - 0.5) * 20);
            });
        }

        function addHouse() {
            loadModel('models/дом/', 'Cyprys_House.obj', 'Cyprys_House.mtl', function(obj) {
                obj.position.set((Math.random() - 0.5) * 20, 0, (Math.random() - 0.5) * 20);
            });
        }

        function addBird() {
            loadAnimatedModel('models/Parrot.glb', function(mesh) {
                mesh.position.set((Math.random() - 0.5) * 20, 1, (Math.random() - 0.5) * 20);
            });
        }

        // Удаление выбранного объекта
        function deleteSelectedObject() {
            if (selectedObject) {
                const index = targetList.indexOf(selectedObject);
                if (index !== -1) targetList.splice(index, 1);
                const morphIndex = morphs.indexOf(selectedObject);
                if (morphIndex !== -1) morphs.splice(morphIndex, 1);
                scene.remove(selectedObject);
                selectedObject = null;
                resetTransformParams();
            }
        }

        function resetTransformParams() {
            params.scaleX = 1; params.scaleY = 1; params.scaleZ = 1;
            params.rotX = 0; params.rotY = 0; params.rotZ = 0;
            if (gui && gui.__controllers) {
                gui.__controllers.forEach(c => c.updateDisplay());
            }
        }

        function updateSelectedTransform() {
            if (selectedObject) {
                selectedObject.scale.set(params.scaleX, params.scaleY, params.scaleZ);
                selectedObject.rotation.set(params.rotX, params.rotY, params.rotZ);
            }
        }

        // Обработчики мыши
        function onDocumentMouseDown(event) {
            event.preventDefault();
            if (event.which !== 1) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (brushMode) {
                isDragging = true;
                applyBrush();
            } else {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(targetList, true);
                if (intersects.length > 0) {
                    let obj = intersects[0].object;
                    while (obj.parent && obj.parent !== scene) {
                        obj = obj.parent;
                    }
                    selectedObject = obj;
                    params.scaleX = selectedObject.scale.x;
                    params.scaleY = selectedObject.scale.y;
                    params.scaleZ = selectedObject.scale.z;
                    params.rotX = selectedObject.rotation.x;
                    params.rotY = selectedObject.rotation.y;
                    params.rotZ = selectedObject.rotation.z;
                    if (gui && gui.__controllers) {
                        gui.__controllers.forEach(c => c.updateDisplay());
                    }
                    isDragging = true;
                } else {
                    selectedObject = null;
                    resetTransformParams();
                }
            }
        }

        function onDocumentMouseUp(event) {
            if (event.which !== 1) return;
            isDragging = false;
        }

        function onDocumentMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (brushMode && isDragging) {
                applyBrush();
            } else if (!brushMode && isDragging && selectedObject) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(planeMesh);
                if (intersects.length > 0) {
                    const point = intersects[0].point;
                    selectedObject.position.x = point.x;
                    selectedObject.position.z = point.z;
                }
            }
            updateBrushPosition();
        }

        function onDocumentMouseScroll(event) {
            if (brushMode) {
                brushRadius += event.deltaY * -0.001;
                brushRadius = Math.max(0.5, Math.min(5.0, brushRadius));
                brushCircle.scale.set(brushRadius, brushRadius, brushRadius);
                params.brushRadius = brushRadius;
                document.getElementById('radius').innerText = brushRadius.toFixed(1);
            }
        }

        function updateBrushPosition() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(planeMesh);
            if (intersects.length > 0) {
                const point = intersects[0].point;
                brushCircle.position.x = point.x;
                brushCircle.position.z = point.z;
            }
        }

        // Кисть: накапливающаяся деформация
        function applyBrush() {
            if (!planeMesh || !planeMesh.geometry) return;
            const geometry = planeMesh.geometry;
            if (!geometry.attributes || !geometry.attributes.position) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(planeMesh);
            if (intersects.length === 0) return;

            const point = intersects[0].point;
            const centerX = point.x;
            const centerZ = point.z;
            const radius = brushRadius;

            const positionAttribute = geometry.attributes.position;
            const vertex = new THREE.Vector3();
            let changedCount = 0;
            const strength = 0.03;

            for (let i = 0; i < positionAttribute.count; i++) {
                vertex.x = positionAttribute.getX(i);
                vertex.y = positionAttribute.getY(i);
                vertex.z = positionAttribute.getZ(i);

                const dx = vertex.x - centerX;
                const dz = vertex.z - centerZ;
                const dist = Math.sqrt(dx*dx + dz*dz);

                if (dist <= radius) {
                    const weight = 1 - (dist / radius);
                    const increment = strength * weight;
                    positionAttribute.setY(i, vertex.y + increment);
                    changedCount++;
                }
            }

            if (changedCount > 0) {
                positionAttribute.needsUpdate = true;
                geometry.computeVertexNormals();
                geometry.computeFaceNormals();
                geometry.computeBoundingBox();
                geometry.computeBoundingSphere();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            if (mixer) {
                mixer.update(delta);
            }

            renderer.render(scene, camera);
        }

        // Запуск
        initScene();
        animate();
    </script>
</body>
</html>
